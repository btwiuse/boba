name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: go-task/setup-task@v2

      - name: Build assets
        # Wipe committed outputs first so Task's source/generates check
        # rebuilds rather than false-positively reusing stale committed bytes.
        run: |
          rm -rf serve/static/boba serve/static/ghostty-web
          task build-serve-assets

      - name: Test
        run: task test

      - name: gofmt
        run: |
          fmt_files=$(gofmt -l .)
          if [ -n "$fmt_files" ]; then
            echo "gofmt would reformat the following files:"
            echo "$fmt_files"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --enable=errcheck --timeout=5m ./...
          skip-cache: true

      - name: Build
        run: task build

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean
